name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Library tests (default features).
      - run: cargo test -p leptoskit
      # Examples are separate member crates (CSR apps), so build them by name.
      - run: cargo build -p basic-folio -p gesture-demo -p onboarding-tour

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # ssr and hydrate are mutually exclusive, so lint each feature set on its own.
      - run: cargo clippy -p leptoskit --no-default-features -- -D warnings
      - run: cargo clippy -p leptoskit --features ssr -- -D warnings
      - run: cargo clippy -p leptoskit --features hydrate -- -D warnings
